<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Tweet Generator | Create Meme Tweets</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #15202b;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        h1 {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #1d9bf0;
        }
        .subtitle {
            grid-column: 1 / -1;
            text-align: center;
            color: #8899a6;
            margin-bottom: 20px;
        }
        .editor {
            background: #192734;
            padding: 20px;
            border-radius: 16px;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #8899a6;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #38444d;
            border-radius: 8px;
            background: #15202b;
            color: #fff;
            font-size: 16px;
        }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #1d9bf0; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; }
        .preview-section { display: flex; flex-direction: column; gap: 20px; }
        .tweet-preview {
            background: #000;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2f3336;
        }
        .tweet-header { display: flex; gap: 12px; margin-bottom: 12px; }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { display: flex; flex-direction: column; justify-content: center; }
        .name-row { display: flex; align-items: center; gap: 4px; }
        .display-name { font-weight: 700; font-size: 15px; }
        .verified { width: 18px; height: 18px; display: none; }
        .verified.show { display: inline; }
        .handle { color: #71767b; font-size: 15px; }
        .tweet-content {
            font-size: 17px;
            line-height: 1.4;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .tweet-time {
            color: #71767b;
            font-size: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2f3336;
            margin-bottom: 12px;
        }
        .tweet-stats {
            display: flex;
            gap: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2f3336;
            margin-bottom: 12px;
        }
        .stat { display: flex; gap: 4px; }
        .stat-num { font-weight: 700; }
        .stat-label { color: #71767b; }
        .tweet-actions { display: flex; justify-content: space-around; }
        .action { color: #71767b; font-size: 18px; }
        .download-btn {
            background: #1d9bf0;
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .download-btn:hover { background: #1a8cd8; }
        .theme-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .theme-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #38444d;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            cursor: pointer;
        }
        .theme-btn.active { border-color: #1d9bf0; background: rgba(29,155,240,0.1); }
        .tweet-preview.light { background: #fff; border-color: #eff3f4; }
        .tweet-preview.light .display-name { color: #0f1419; }
        .tweet-preview.light .tweet-content { color: #0f1419; }
        .tweet-preview.light .tweet-time { border-color: #eff3f4; }
        .tweet-preview.light .tweet-stats { border-color: #eff3f4; }
        .tweet-preview.light .stat-num { color: #0f1419; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fake Tweet Generator</h1>
        <p class="subtitle">Create fake tweets for memes. For entertainment only.</p>
        <div class="editor">
            <div class="theme-toggle">
                <button class="theme-btn active" onclick="setTheme('dark')">Dark Mode</button>
                <button class="theme-btn" onclick="setTheme('light')">Light Mode</button>
            </div>
            <div class="form-group">
                <label>Profile Picture URL (optional)</label>
                <input type="text" id="avatarUrl" placeholder="https://example.com/pic.jpg" oninput="updatePreview()">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="displayName" value="Elon Musk" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Handle</label>
                    <input type="text" id="handle" value="elonmusk" oninput="updatePreview()">
                </div>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="verified" checked onchange="updatePreview()">
                <label for="verified" style="margin:0;">Verified Badge</label>
            </div>
            <div class="form-group">
                <label>Tweet Content</label>
                <textarea id="tweetContent" oninput="updatePreview()">just mass deported the concept of sleep from my life</textarea>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Time</label>
                    <input type="text" id="tweetTime" value="4:20 PM" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" id="tweetDate" value="Mar 23, 2026" oninput="updatePreview()">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Retweets</label>
                    <input type="text" id="retweets" value="42.1K" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Quotes</label>
                    <input type="text" id="quotes" value="6,942" oninput="updatePreview()">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Likes</label>
                    <input type="text" id="likes" value="694.2K" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>Views</label>
                    <input type="text" id="views" value="12.4M" oninput="updatePreview()">
                </div>
            </div>
        </div>
        <div class="preview-section">
            <div class="tweet-preview" id="tweetPreview">
                <div class="tweet-header">
                    <div class="avatar" id="avatarDisplay">E</div>
                    <div class="user-info">
                        <div class="name-row">
                            <span class="display-name" id="nameDisplay">Elon Musk</span>
                            <svg class="verified show" id="verifiedBadge" viewBox="0 0 22 22" fill="#1d9bf0">
                                <path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z"/>
                            </svg>
                        </div>
                        <span class="handle" id="handleDisplay">@elonmusk</span>
                    </div>
                </div>
                <div class="tweet-content" id="contentDisplay">just mass deported the concept of sleep from my life</div>
                <div class="tweet-time" id="timeDisplay">4:20 PM · Mar 23, 2026</div>
                <div class="tweet-stats">
                    <div class="stat"><span class="stat-num" id="retweetsDisplay">42.1K</span><span class="stat-label">Retweets</span></div>
                    <div class="stat"><span class="stat-num" id="quotesDisplay">6,942</span><span class="stat-label">Quotes</span></div>
                    <div class="stat"><span class="stat-num" id="likesDisplay">694.2K</span><span class="stat-label">Likes</span></div>
                    <div class="stat"><span class="stat-num" id="viewsDisplay">12.4M</span><span class="stat-label">Views</span></div>
                </div>
                <div class="tweet-actions">
                    <span class="action">💬</span>
                    <span class="action">🔁</span>
                    <span class="action">❤️</span>
                    <span class="action">📤</span>
                </div>
            </div>
            <button class="download-btn" onclick="downloadTweet()">Download Tweet Image</button>
        </div>
    </div>
    <script>
        function updatePreview() {
            const displayName = document.getElementById('displayName').value || 'Name';
            const handle = document.getElementById('handle').value || 'handle';
            const content = document.getElementById('tweetContent').value || '';
            const time = document.getElementById('tweetTime').value || '';
            const date = document.getElementById('tweetDate').value || '';
            const retweets = document.getElementById('retweets').value || '0';
            const quotes = document.getElementById('quotes').value || '0';
            const likes = document.getElementById('likes').value || '0';
            const views = document.getElementById('views').value || '0';
            const verified = document.getElementById('verified').checked;
            const avatarUrl = document.getElementById('avatarUrl').value;
            document.getElementById('nameDisplay').textContent = displayName;
            document.getElementById('handleDisplay').textContent = '@' + handle.replace('@', '');
            document.getElementById('contentDisplay').textContent = content;
            document.getElementById('timeDisplay').textContent = time + ' · ' + date;
            document.getElementById('retweetsDisplay').textContent = retweets;
            document.getElementById('quotesDisplay').textContent = quotes;
            document.getElementById('likesDisplay').textContent = likes;
            document.getElementById('viewsDisplay').textContent = views;
            const badge = document.getElementById('verifiedBadge');
            badge.classList.toggle('show', verified);
            const avatar = document.getElementById('avatarDisplay');
            if (avatarUrl) {
                avatar.innerHTML = '<img src="' + avatarUrl + '" alt="avatar">';
            } else {
                avatar.innerHTML = displayName.charAt(0).toUpperCase();
            }
        }
        function setTheme(theme) {
            const preview = document.getElementById('tweetPreview');
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (theme === 'light') {
                preview.classList.add('light');
            } else {
                preview.classList.remove('light');
            }
        }
        function downloadTweet() {
            const tweet = document.getElementById('tweetPreview');
            html2canvas(tweet, { backgroundColor: null, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'fake-tweet.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
